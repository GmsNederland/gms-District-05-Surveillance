<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nieuw Incident</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; }
    .dialog { background: white; border-radius: 8px; width: 100%; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .dialog-header, .dialog-footer { padding: 12px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
    .dialog-footer { border-top: 1px solid #ccc; border-bottom: none; }
    .dialog-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    label { font-size: 12px; font-weight: bold; display:block; margin-bottom:4px; }
    input, select { width: 100%; padding:6px; font-size:12px; border:1px solid #ccc; border-radius:4px; }
    textarea { width:100%; padding:6px; font-size:12px; border:1px solid #ccc; border-radius:4px; height:60px; resize:none; }
    button { padding:6px 10px; font-size:12px; border-radius:4px; border:none; cursor:pointer; }
    .btn-outline { background: #fff; border:1px solid #ccc; }
    .btn-primary { background: #007bff; color:white; }
    .btn-primary:disabled { background:#aaa; cursor:not-allowed; }
    .close-btn { background:none; border:none; font-size:16px; cursor:pointer; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  </style>
</head>
<body>

<div class="overlay" id="incident-dialog">
  <div class="dialog">
    <div class="dialog-header">
      <h2 style="font-size:14px;">Nieuw Incident Aanmaken</h2>
      <button class="close-btn" id="close-dialog">✖️</button>
    </div>
    <div class="dialog-body">
      <div>
        <label>Titel / Omschrijving *</label>
        <input type="text" id="incident-title" placeholder="Bijv. Brand woning, Ongeval A10...">
      </div>

      <div class="grid-2">
        <div>
          <label>Type incident</label>
          <select id="incident-type">
            <option value="">Selecteer...</option>
            <option value="Brand">Brand</option>
            <option value="Ongeval">Ongeval</option>
            <option value="Inbraak">Inbraak</option>
          </select>
        </div>
        <div>
          <label>Prioriteit</label>
          <select id="incident-priority">
            <option value="1">PRIO 1 — Spoed</option>
            <option value="2" selected>PRIO 2 — Dringend</option>
            <option value="3">PRIO 3 — Gepland</option>
          </select>
        </div>
      </div>

      <div class="grid-2">
        <div>
          <label>Dienst</label>
          <select id="incident-service">
            <option value="politie">Politie</option>
            <option value="ambulance">Ambulance</option>
            <option value="brandweer">Brandweer</option>
          </select>
        </div>
        <div>
          <label>Regio</label>
          <select id="incident-region">
            <option value="">Selecteer...</option>
            <option value="Noord-Holland">Noord-Holland</option>
            <option value="Zuid-Holland">Zuid-Holland</option>
            <option value="Utrecht">Utrecht</option>
          </select>
        </div>
      </div>

      <div>
        <label>Locatie</label>
        <input type="text" id="incident-location" placeholder="Adres of locatiebeschrijving">
      </div>

      <div>
        <label>Melder ID</label>
        <input type="text" id="incident-caller" placeholder="Naam / telefoonnummer">
      </div>

      <div>
        <label>Notities</label>
        <textarea id="incident-notes" placeholder="Eventuele extra info..."></textarea>
      </div>
    </div>

    <div class="dialog-footer">
      <button class="btn-outline" id="cancel-btn">Annuleren</button>
      <button class="btn-primary" id="save-btn">Incident Aanmaken</button>
    </div>
  </div>
</div>

<script>
  const dialog = document.getElementById('incident-dialog');
  const closeBtn = document.getElementById('close-dialog');
  const cancelBtn = document.getElementById('cancel-btn');
  const saveBtn = document.getElementById('save-btn');

  const titleInput = document.getElementById('incident-title');
  const typeSelect = document.getElementById('incident-type');
  const prioritySelect = document.getElementById('incident-priority');
  const serviceSelect = document.getElementById('incident-service');
  const regionSelect = document.getElementById('incident-region');
  const locationInput = document.getElementById('incident-location');
  const callerInput = document.getElementById('incident-caller');
  const notesInput = document.getElementById('incident-notes');

  function generateIncidentNumber() {
    return 'INC' + Date.now();
  }

  closeBtn.onclick = cancelBtn.onclick = () => { dialog.style.display = 'none'; };

  saveBtn.onclick = () => {
    if (!titleInput.value.trim()) {
      alert('Titel is verplicht!');
      return;
    }
    saveBtn.disabled = true;
    saveBtn.textContent = 'Aanmaken...';

    const incident = {
      id: generateIncidentNumber(),
      title: titleInput.value.trim(),
      incident_type: typeSelect.value,
      priority: parseInt(prioritySelect.value),
      service: serviceSelect.value,
      region: regionSelect.value,
      location: locationInput.value.trim(),
      caller_id: callerInput.value.trim(),
      notes: notesInput.value ? [{ timestamp: new Date().toISOString(), author: 'Systeem', content: notesInput.value }] : []
    };

    // Simuleer API call
    setTimeout(() => {
      console.log('Incident aangemaakt:', incident);
      alert('Incident succesvol aangemaakt!');
      saveBtn.disabled = false;
      saveBtn.textContent = 'Incident Aanmaken';
      dialog.style.display = 'none';
    }, 500);
  };
</script>

</body>
</html>
