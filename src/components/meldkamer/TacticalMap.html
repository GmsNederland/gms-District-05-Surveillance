<div id="map" style="width:100%;height:100vh;"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([52.370216, 4.895168], 13); // MAP_CENTER

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap',
}).addTo(map);

// Voorbeeld data
const units = [
  {id:1,callsign:'POL1',service:'politie',status:'available',latitude:52.371,longitude:4.895}
];
const incidents = [
  {id:1,incident_number:'INC001',title:'Brand woning',priority:2,status:'NEW',latitude:52.369,longitude:4.897,location:'Amsterdam'}
];
const calls = [
  {id:1,caller_id:'0612345678',caller_location:'Centrum',status:'waiting',latitude:52.372,longitude:4.894}
];

// Unit markers
units.forEach(u=>{
  L.circleMarker([u.latitude, u.longitude], {
    radius:6,
    color:'#3b82f6',
    fillColor:'#3b82f6',
    fillOpacity:0.8
  }).addTo(map).bindPopup(`${u.callsign} (${u.service})`);
});

// Incident markers
incidents.forEach(i=>{
  if(i.status!=='CLOSED'){
    L.rectangleMarker([i.latitude, i.longitude], {
      radius:8,
      color:'#f97316'
    }).addTo(map).bindPopup(`${i.incident_number}: ${i.title} - ${i.location}`);
  }
});

// Calls
calls.forEach(c=>{
  if(c.status==='waiting'){
    L.circle([c.latitude,c.longitude], {
      radius:20,
      color:'#dc2626',
      fillColor:'#dc2626',
      fillOpacity:0.3
    }).addTo(map).bindPopup(`112 Melding: ${c.caller_id} - ${c.caller_location}`);
  }
});
</script>
