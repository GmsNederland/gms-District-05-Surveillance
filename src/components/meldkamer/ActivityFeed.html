<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Feed</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .activity-feed { display: flex; flex-direction: column; height: 400px; border: 1px solid #ccc; border-radius: 4px; }
    .feed-header { padding: 10px; border-bottom: 1px solid #ccc; display: flex; align-items: center; gap: 8px; font-weight: bold; }
    .feed-body { flex: 1; overflow-y: auto; padding: 8px; }
    .activity-item { display: flex; gap: 8px; padding: 6px 0; font-size: 12px; }
    .activity-icon { flex-shrink: 0; margin-top: 2px; }
    .activity-text { flex: 1; min-width: 0; }
    .activity-sub { color: #888; font-size: 10px; display: flex; gap: 4px; }
    .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    /* icon kleuren */
    .icon-orange { color: orange; }
    .icon-green { color: green; }
    .icon-red { color: red; }
    .no-activity { text-align: center; color: #888; padding: 40px 0; font-size: 12px; }
  </style>
</head>
<body>

<div class="activity-feed">
  <div class="feed-header">
    📊 <span>Activiteit</span>
  </div>
  <div class="feed-body" id="activity-feed">
    <div class="no-activity">Geen activiteit</div>
  </div>
</div>

<script>
  // Voorbeelddata
  const incidents = [
    { incident_number: '123', title: 'Server down', status: 'open', created_date: '2026-03-23T14:15:00' },
    { incident_number: '124', title: 'Database issue', status: 'resolved', created_date: '2026-03-23T15:00:00' }
  ];

  const calls = [
    { caller_id: 'John', status: 'completed', accepted_by: 'Alice@example.com', created_date: '2026-03-23T14:30:00', updated_date: '2026-03-23T14:35:00' }
  ];

  const broadcasts = [
    { title: 'Maintenance', type: 'info', created_date: '2026-03-23T13:50:00' }
  ];

  // Bouw de items
  const items = [];

  incidents.slice(0, 10).forEach(inc => {
    items.push({
      time: inc.created_date,
      icon: '⚠️', // AlertTriangle
      iconClass: 'icon-orange',
      text: `Incident ${inc.incident_number || ''} — ${inc.title}`,
      sub: inc.status
    });
  });

  calls.filter(c => c.status === 'completed').slice(0, 5).forEach(call => {
    items.push({
      time: call.updated_date || call.created_date,
      icon: '📞', // Phone
      iconClass: 'icon-green',
      text: `Melding van ${call.caller_id} afgehandeld`,
      sub: call.accepted_by ? call.accepted_by.split('@')[0] : ''
    });
  });

  broadcasts.slice(0, 5).forEach(b => {
    items.push({
      time: b.created_date,
      icon: '🔔', // Bell
      iconClass: 'icon-red',
      text: `Broadcast: ${b.title}`,
      sub: b.type
    });
  });

  // Sorteer op tijd
  items.sort((a, b) => new Date(b.time) - new Date(a.time));

  const feed = document.getElementById('activity-feed');
  feed.innerHTML = ''; // clear placeholder

  if (items.length === 0) {
    feed.innerHTML = '<div class="no-activity">Geen activiteit</div>';
  } else {
    items.slice(0, 20).forEach(item => {
      const div = document.createElement('div');
      div.className = 'activity-item';
      div.innerHTML = `
        <div class="activity-icon ${item.iconClass}">${item.icon}</div>
        <div class="activity-text">
          <div class="truncate">${item.text}</div>
          <div class="activity-sub">
            <span>${new Date(item.time).toLocaleTimeString('nl-NL')}</span>
            ${item.sub ? `<span>• ${item.sub}</span>` : ''}
          </div>
        </div>
      `;
      feed.appendChild(div);
    });
  }
</script>

</body>
</html>
