<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incident Detail</title>
<style>
  body { font-family: Arial, sans-serif; margin:20px; }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; padding:10px; }
  .detail-card { background:white; border-radius:6px; width:90%; max-width:700px; max-height:90vh; display:flex; flex-direction:column; border-left:4px solid orange; overflow:hidden; }
  .header { padding:10px; border-bottom:1px solid #ccc; display:flex; justify-content:space-between; flex-shrink:0; }
  .header h2 { margin:0; font-size:16px; }
  .status-bar { display:flex; justify-content:space-between; padding:8px 10px; border-bottom:1px solid #ccc; background:#f0f0f0; font-size:12px; }
  .tabs { display:flex; border-bottom:1px solid #ccc; background:#fafafa; }
  .tab { padding:6px 10px; cursor:pointer; font-size:12px; }
  .tab.active { font-weight:bold; border-bottom:2px solid blue; }
  .tab-content { flex:1; overflow-y:auto; padding:10px; }
  .info-row { background:#f8f8f8; padding:6px; border-radius:4px; margin-bottom:4px; font-size:12px; }
  .notes textarea { width:100%; resize:none; font-size:12px; padding:6px; border-radius:4px; margin-bottom:4px; }
  .note { background:#f4f4f4; padding:6px; border-radius:4px; margin-bottom:4px; font-size:12px; }
  .units div, .assign div { display:flex; justify-content:space-between; padding:6px; background:#f4f4f4; margin-bottom:4px; border-radius:4px; font-size:12px; }
  button { cursor:pointer; }
</style>
</head>
<body>

<div class="overlay" id="incident-detail">
  <div class="detail-card">
    <div class="header">
      <div>
        <div><span id="prio-label" style="background:orange;color:white;padding:1px 4px;border-radius:2px;font-size:10px;">PRIO 2</span> <span id="incident-number" style="font-family:monospace;font-size:12px;">INC001</span></div>
        <h2 id="incident-title">Brand in woning</h2>
        <div id="incident-location" style="font-size:12px;color:#555;">📍 Amsterdam</div>
      </div>
      <button onclick="closeDetail()">✖️</button>
    </div>

    <div class="status-bar">
      <div>
        Status:
        <select id="status-select">
          <option value="NEW">Nieuw</option>
          <option value="IN_PROGRESS">In behandeling</option>
          <option value="DISPATCHED">Uitgerukt</option>
          <option value="CLOSED">Gesloten</option>
        </select>
      </div>
      <div id="claimed-by">
        <button onclick="claimIncident()">Claimen</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="overview">Overzicht</div>
      <div class="tab" data-tab="notes">Notities</div>
      <div class="tab" data-tab="units">Eenheden</div>
    </div>

    <div class="tab-content">
      <!-- content wordt dynamisch geladen -->
    </div>

  </div>
</div>

<script>
const incident = {
  id:1,
  incident_number:'INC001',
  title:'Brand in woning',
  location:'Amsterdam',
  priority:2,
  status:'NEW',
  claimed_by:null,
  notes:[],
  assigned_units:[],
  incident_type:'Brand',
  region:'Regio 1',
  service:'politie',
  caller_id:'0612345678',
  created_date: new Date().toISOString()
};

const prioColors = {1:'red',2:'orange',3:'green'};
const statusLabels = {NEW:'Nieuw',IN_PROGRESS:'In behandeling',DISPATCHED:'Uitgerukt',CLOSED:'Gesloten'};

function renderOverview() {
  const tabContent = document.querySelector('.tab-content');
  tabContent.innerHTML = `
    <div class="info-row">Type: ${incident.incident_type}</div>
    <div class="info-row">Regio: ${incident.region}</div>
    <div class="info-row">Dienst: ${incident.service}</div>
    <div class="info-row">Melder: ${incident.caller_id}</div>
    <div class="info-row">Aangemaakt: ${new Date(incident.created_date).toLocaleString()}</div>
    <div class="info-row">Eenheden: ${incident.assigned_units.length>0 ? incident.assigned_units.join(', ') : 'Geen'}</div>
  `;
}

function renderNotes() {
  const tabContent = document.querySelector('.tab-content');
  let notesHtml = incident.notes.slice().reverse().map(n=>`<div class="note"><b>${n.author}</b> (${new Date(n.timestamp).toLocaleTimeString()}): ${n.content}</div>`).join('');
  if(!notesHtml) notesHtml = '<div style="text-align:center;color:#888;font-size:12px;">Geen notities</div>';
  tabContent.innerHTML = `<div class="notes"><textarea id="new-note" rows="3" placeholder="Notitie toevoegen..."></textarea><button onclick="addNote()">➕</button>${notesHtml}</div>`;
}

function renderUnits() {
  const tabContent = document.querySelector('.tab-content');
  let assignedHtml = incident.assigned_units.length ? incident.assigned_units.map(u=>`<div>${u} <button onclick="removeUnit('${u}')">❌</button></div>`).join('') : '<div style="text-align:center;color:#888;">Geen eenheden toegewezen</div>';
  tabContent.innerHTML = `<div class="units">${assignedHtml}</div>`;
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const tabName = tab.dataset.tab;
    if(tabName==='overview') renderOverview();
    if(tabName==='notes') renderNotes();
    if(tabName==='units') renderUnits();
  };
});

// Initial render
document.getElementById('prio-label').style.background = prioColors[incident.priority];
document.getElementById('prio-label').textContent = 'PRIO '+incident.priority;
document.getElementById('incident-number').textContent = incident.incident_number;
document.getElementById('incident-title').textContent = incident.title;
document.getElementById('incident-location').textContent = '📍 '+incident.location;
document.getElementById('status-select').value = incident.status;

renderOverview();

// Functions
function closeDetail(){ document.getElementById('incident-detail').style.display='none'; }
function claimIncident(){ incident.claimed_by='Centralist'; document.getElementById('claimed-by').textContent='👤 Centralist'; }
function addNote(){ 
  const val = document.getElementById('new-note').value;
  if(!val.trim()) return;
  incident.notes.push({timestamp:new Date().toISOString(),author:'Centralist',content:val});
  renderNotes();
}
function removeUnit(u){ incident.assigned_units = incident.assigned_units.filter(x=>x!==u); renderUnits(); }
document.getElementById('status-select').onchange = (e)=>{ incident.status=e.target.value; alert('Status gewijzigd naar '+statusLabels[e.target.value]); }
</script>

</body>
</html>
