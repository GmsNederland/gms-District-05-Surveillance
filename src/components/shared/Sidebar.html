<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D05 GMS Sidebar</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/codes/scripts.js" defer></script>
  <!-- Lucide Icons via CDN -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/lucide@0.264.0/dist/lucide.esm.js"></script>
</head>
<body>

  <aside id="sidebar" class="sidebar">
    <!-- D05 Brand -->
  <div class="sidebar-brand">
    <!-- Shield icon als SVG -->
    <svg xmlns="http://www.w3.org/2000/svg" class="icon-brand" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
  </div>

    <div class="divider"></div>

    <!-- Back to roles -->
    <button class="sidebar-btn" title="Dienst wijzigen" onclick="backToRoles()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <!-- Active service -->
    <div id="activeService" class="sidebar-service" title="POLITIE">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>

    <div class="flex-spacer"></div>

    <!-- Logout -->
    <button class="sidebar-btn danger" title="Uitloggen" onclick="logout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </aside>
  <script>
    // Init Lucide icons
    lucide.createIcons();
  </script>

</body>
</html>
