<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vacatures - Regio 20 Surveillance</title>
    <link rel="icon" type="image/x-icon" href="/src/icone/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">
  

<!-- HERO -->
<section class="relative h-64 flex items-center justify-center bg-cover bg-center" style="background-image:url('/src/codes/achtergrond.png')">
  <div class="absolute inset-0 bg-black/70"></div>
  <h1 class="relative z-10 text-5xl font-extrabold tracking-widest">VACATURES</h1>
</section>

<!-- INFO -->
<section class="max-w-6xl mx-auto p-6">
  <p class="text-gray-400 mb-6">Klik op een vacature voor details en solliciteren.</p>

  <!-- GRID -->
  <div id="vacatureGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</section>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4">

  <div class="bg-white/10 border border-white/10 backdrop-blur-2xl p-6 rounded-2xl w-full max-w-2xl shadow-2xl">

    <h2 id="modalTitle" class="text-3xl font-bold mb-2"></h2>
    <p id="modalDesc" class="text-gray-300 mb-4"></p>

    <h3 class="text-gray-200 font-semibold mb-2">Eisen</h3>
    <ul id="modalRequirements" class="list-disc pl-5 text-gray-400 mb-6"></ul>

    <div class="flex gap-3">
      <a href="/src/pages/solliciteren.html" class="bg-green-500 hover:bg-green-400 px-5 py-2 rounded-xl font-semibold transition">
        Solliciteer nu
      </a>
      <button onclick="closeModal()" class="bg-white/10 hover:bg-white/20 px-5 py-2 rounded-xl transition">
        Sluiten
      </button>
    </div>

  </div>
</div>

<script>
const API_KEY = "f431cc28112935ca5a77ef3d90675e91";
const TOKEN = "ATTAd9c7fee65dcb73f35c8c4e3bc6c4b18eacaa8b988a79e349e2442610c914c568202AF5B6";
const LIST_ID = "69f6b0742db309248dfc37c3";

function getStatus(labels = []) {
  const names = labels.map(l => l.name.toLowerCase());
  if (names.includes("gesloten")) return "Gesloten";
  if (names.includes("in review")) return "In Review";
  return "Open";
}

function getDepartment(labels = []) {
  const ignore = ["open", "gesloten", "in review"];
  const dept = labels.find(l => !ignore.includes(l.name.toLowerCase()));
  return dept ? dept.name : "Algemeen";
}

function badge(status) {
  if (status === "Open") return `<span class='px-3 py-1 rounded-full bg-green-600 text-xs'>Open</span>`;
  if (status === "In Review") return `<span class='px-3 py-1 rounded-full bg-yellow-500 text-xs text-black'>In Review</span>`;
  if (status === "Gesloten") return `<span class='px-3 py-1 rounded-full bg-red-600 text-xs'>Gesloten</span>`;
  return `<span class='px-3 py-1 rounded-full bg-gray-600 text-xs'>Onbekend</span>`;
}

async function loadVacatures() {
  try {
    const url = `https://api.trello.com/1/lists/${LIST_ID}/cards?labels=all&key=${API_KEY}&token=${TOKEN}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error(await res.text());

    const data = await res.json();

    const grid = document.getElementById("vacatureGrid");
    grid.innerHTML = "";

    data.forEach(card => {
      const status = getStatus(card.labels);
      const dept = getDepartment(card.labels);

      const el = document.createElement("div");

      el.className = `relative p-6 rounded-2xl bg-white/5 backdrop-blur-xl border border-white/10 shadow-lg hover:shadow-[0_0_25px_rgba(0,255,150,0.15)] hover:border-white/20 transition duration-300 cursor-pointer group`;

      el.innerHTML = `
        <div class="absolute top-4 right-4">
          ${badge(status)}
        </div>

        <h3 class="text-xl font-bold mb-2 group-hover:text-green-400 transition">
          ${card.name}
        </h3>

        <p class="text-sm text-gray-400 mb-3">Afdeling: ${dept}</p>

        <p class="text-gray-500 text-sm">
          ${card.desc ? card.desc.substring(0, 120) + "..." : "Geen beschrijving"}
        </p>

        <div class="mt-4 text-xs text-gray-600">
          Klik voor details →
        </div>
      `;

      if (status !== "Gesloten") {
        el.onclick = () => openModal(card.name, card.desc || "Geen beschrijving");
      } else {
        el.classList.add("opacity-40");
      }

      grid.appendChild(el);
    });

  } catch (err) {
    console.error("Trello error:", err.message);
  }
}

function openModal(title, desc) {
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalDesc").innerText = desc;

  const list = document.getElementById("modalRequirements");
  list.innerHTML = "";

  desc.split("- ").slice(1).forEach(r => {
    const li = document.createElement("li");
    li.innerText = r;
    list.appendChild(li);
  });

  document.getElementById("modal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

loadVacatures();
setInterval(loadVacatures, 15000);
</script>

</body>
</html>
