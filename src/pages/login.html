<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>District 05 — Authenticatie</title>

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:#0b0f14;
  color:white;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.grid{
  position:absolute;
  inset:0;
  opacity:0.03;
  background-image:
    linear-gradient(#3b82f6 1px, transparent 1px),
    linear-gradient(90deg,#3b82f6 1px, transparent 1px);
  background-size:60px 60px;
}

.scanline{
  position:fixed;
  inset:0;
  pointer-events:none;
  background: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.02) 3px
  );
}

.container{
  position:relative;
  z-index:10;
  text-align:center;
}

.logo{
  width:56px;
  height:56px;
  border-radius:12px;
  background:rgba(59,130,246,0.1);
  border:1px solid rgba(59,130,246,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
}

.logo svg{
  width:28px;
  height:28px;
  fill:#3b82f6;
}

.brand{
  margin-top:18px;
}

.brand h1{
  font-size:14px;
  letter-spacing:3px;
  text-transform:uppercase;
  margin:0;
}

.brand p{
  font-size:11px;
  color:#9ca3af;
  margin-top:6px;
  font-family: monospace;
}

.login-box{
  margin-top:20px;
}

.login-box input{
  width:200px;
  padding:8px;
  margin:5px;
  background:#111827;
  border:1px solid #374151;
  color:white;
  border-radius:6px;
}

.login-box button{
  padding:8px 20px;
  margin-top:10px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.login-box button:hover{
  background:#2563eb;
}

.loader{
  margin-top:15px;
  display:none;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.spinner{
  width:16px;
  height:16px;
  border-radius:50%;
  border:2px solid rgba(59,130,246,0.2);
  border-top:2px solid #3b82f6;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

.error{
  color:#ef4444;
  font-size:12px;
  margin-top:10px;
}

.sysinfo{
  margin-top:18px;
  font-size:9px;
  font-family: monospace;
  color:rgba(156,163,175,0.4);
  letter-spacing:2px;
}
</style>
</head>

<body>

<div class="grid"></div>
<div class="scanline"></div>

<div class="container">

  <div class="logo">
    <svg viewBox="0 0 24 24">
      <path d="M12 2L4 5v6c0 5 3.5 9.5 8 11 4.5-1.5 8-6 8-11V5l-8-3z"/>
    </svg>
  </div>

  <div class="brand">
    <h1>District 05</h1>
    <p>Gemeenschappelijke Meldkamer Systeem</p>
  </div>

  <!-- LOGIN -->
  <div class="login-box">
    <input id="username" placeholder="Gebruikersnaam"><br>
    <input id="password" type="password" placeholder="Wachtwoord"><br>
    <button onclick="login()">Login</button>
  </div>

  <!-- LOADER -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <span>Controleren...</span>
  </div>

  <!-- ERROR -->
  <div class="error" id="error"></div>

  <div class="sysinfo">
    GMS v2.0 · MDT · CAD
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBRZCtv2Gr145LSlZw1QHIIkKXSHZoUk-U",
  authDomain: "district05surveillance-e5183.firebaseapp.com",
  databaseURL: "https://district05surveillance-e5183-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "district05surveillance-e5183",
  storageBucket: "district05surveillance-e5183.firebasestorage.app",
  messagingSenderId: "492638820842",
  appId: "1:492638820842:web:a3ff331099f9f4e88efa93"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.login = async function() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const errorDiv = document.getElementById("error");
  const loader = document.getElementById("loader");

  errorDiv.innerText = "";

  if (!username || !password) {
    errorDiv.innerText = "Vul alle velden in!";
    return;
  }

  loader.style.display = "flex";

  try {
    const snapshot = await get(ref(db, "users/" + username));

    if (!snapshot.exists()) {
      loader.style.display = "none";
      errorDiv.innerText = "Gebruiker bestaat niet!";
      return;
    }

    const data = snapshot.val();

    if (data.password !== password) {
      loader.style.display = "none";
      errorDiv.innerText = "Wachtwoord onjuist!";
      return;
    }

    /* ✅ LOGIN GELUKT */
    sessionStorage.setItem("user", username);
    sessionStorage.setItem("rol", data.rol);

    loader.querySelector("span").innerText = "Toegang verleend...";

    setTimeout(() => {
      window.location.href = "/src/pages/rolenselect.html";
    }, 1000);

  } catch (err) {
    loader.style.display = "none";
    errorDiv.innerText = "Database fout!";
    console.error(err);
  }
};
</script>

</body>
</html>
