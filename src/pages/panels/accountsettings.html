<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Account Settings — D05 GMS</title>

<link rel="icon" type="image/x-icon" href="/src/icone/logo.png">
<link rel="stylesheet" href="/src/styletopbar.css">

<script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-database-compat.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.6);
  --blue:#3b82f6;
  --blue2:#2563eb;
  --red:#ff4d4d;
}

*{box-sizing:border-box}

body{
  margin:0;
  background: radial-gradient(circle at top, #111a2e, var(--bg));
  color:var(--text);
  font-family: "Segoe UI", sans-serif;
}

/* LAYOUT */
.container{
  max-width:1000px;
  margin:40px auto;
  padding:20px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:22px;
  margin-bottom:16px;
  backdrop-filter: blur(10px);
  transition:.2s;
}

.card:hover{
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.15);
}

/* PROFILE */
.profile{
  display:flex;
  align-items:center;
  gap:15px;
}

.avatar{
  width:64px;
  height:64px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  background:rgba(255,255,255,0.06);
}

h2{margin:0}
small{color:var(--muted)}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:10px;
}

label{
  font-size:12px;
  color:var(--muted);
}

input{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:white;
  outline:none;
}

input:focus{
  border-color:var(--blue);
}

/* BUTTONS */
.btn{
  margin-top:14px;
  padding:11px 14px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background:var(--blue);
  color:white;
  transition:.2s;
}

.btn:hover{background:var(--blue2)}

.btn.danger{
  background:rgba(255,77,77,0.12);
  color:var(--red);
  border:1px solid rgba(255,77,77,0.3);
}

/* TOGGLE */
.toggle{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
}

.switch{
  width:44px;
  height:22px;
  background:#333;
  border-radius:30px;
  position:relative;
  cursor:pointer;
  transition:.2s;
}

.switch::after{
  content:"";
  width:18px;
  height:18px;
  background:white;
  position:absolute;
  top:2px;
  left:2px;
  border-radius:50%;
  transition:.2s;
}

.switch.active{background:var(--blue)}
.switch.active::after{left:24px}

/* LOGS */
.log{
  font-size:13px;
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  color:var(--muted);
}

/* SMALL UX IMPROVEMENTS */
h3{
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR (same structure, cleaner UX kan later verbeterd worden) -->
<div id="overlay" onclick="toggleMenu(false)"></div>

<div id="sidebar">
  <div class="sidebar-header">
    <div class="logo">D05 GMS</div>
    <div class="sub">Dispatch System</div>
  </div>

  <div class="sidebar-section">
    <div class="section-title">Navigatie</div>

    <a class="nav-item" href="/src/pages/rolenselect.html">🏠 Dashboard</a>
    <a class="nav-item active" href="/src/pages/panels/accountsettings.html">⚙️ Instellingen</a>
  </div>
</div>

<!-- TOPBAR (ongewijzigd behouden) -->
<div id="topbar">
  <div class="left">
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <strong>D05·GMS</strong>
  </div>

  <div class="right">
    <div class="datetime">
      <div id="date"></div>
      <div id="clock"></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <!-- PROFILE -->
  <div class="card">
    <div class="profile">
      <div class="avatar">👤</div>
      <div>
        <h2 id="username">Laden...</h2>
        <small id="email">...</small>
      </div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="card">
    <h3>Persoonlijke gegevens</h3>

    <div class="grid">
      <div>
        <label>Gebruikersnaam</label>
        <input id="inputName" type="text">
      </div>

      <div>
        <label>Email</label>
        <input id="inputEmail" type="email">
      </div>

      <div>
        <label>Discord Naam</label>
        <input id="inputdiscord" type="text">
      </div>

      <div>
        <label>Roblox Naam</label>
        <input id="inputroblox" type="text">
      </div>

      <div>
        <label>Discord-userID</label>
        <input id="inputdcid" type="number">
      </div>

      <div>
        <label>Roblox UserId</label>
        <input id="inputrbluserid" type="number">
      </div>
    </div>

    <button class="btn" onclick="save()">Opslaan wijzigingen</button>
  </div>

  <!-- 2FA -->
  <div class="card">
    <h3>Beveiliging</h3>

    <div class="toggle">
      <span>Two-Factor Authentication</span>
      <div class="switch" id="twofa" onclick="toggle2FA()"></div>
    </div>
  </div>

  <!-- LOGS -->
  <div class="card">
    <h3>Activiteit</h3>

    <div class="log">Login succesvol — 12:45</div>
    <div class="log">Wachtwoord gewijzigd — 2 dagen geleden</div>
    <div class="log">Nieuw apparaat — Chrome Windows</div>
  </div>

  <!-- ACTIONS -->
  <div class="card">
    <h3>Account</h3>
    <button class="btn danger" onclick="logout()">Uitloggen</button>
  </div>

</div>

<script>
const user = {
  name: "Loading...",
  email: "loading..."
};

function loadUser(){
  document.getElementById("username").textContent = user.name;
  document.getElementById("email").textContent = user.email;
  document.getElementById("inputName").value = user.name;
  document.getElementById("inputEmail").value = user.email;
}
loadUser();

function save(){
  alert("Wijzigingen opgeslagen (Firebase ready)");
}

function toggle2FA(){
  document.getElementById("twofa").classList.toggle("active");
}

function logout(){
  window.location.href="/src/index.html";
}

/* CLOCK */
function updateClock(){
  const now = new Date();
  document.getElementById("clock").textContent = now.toLocaleTimeString("nl-NL");
  document.getElementById("date").textContent = now.toLocaleDateString("nl-NL");
}
setInterval(updateClock,1000);
updateClock();

/* SIDEBAR */
let open=false;
function toggleMenu(force=null){
  const sidebar=document.getElementById("sidebar");
  const overlay=document.getElementById("overlay");
  open = force!==null?force:!open;
  sidebar.classList.toggle("open",open);
  overlay.classList.toggle("active",open);
}
</script>

</body>
</html>
