<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>112 Burger Panel — District 05</title>
<link rel="icon" type="image/x-icon" href="/icone/logo.png">

<!-- Firebase (moet boven alles staan) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- jouw scripts -->
<script src="/src/codes/topbar.js" defer></script>
<script src="/src/codes/scripts.js" defer></script>
<script src="/src/codes/burger.js" defer></script>

<style>
/* jouw CSS 그대로 laten (niet aangepast) */
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f14;
  color:white;
  overflow-x:hidden;
}
.grid{
  position:absolute;
  inset:0;
  opacity:0.02;
  background-image:
    linear-gradient(#3b82f6 1px, transparent 1px),
    linear-gradient(90deg,#3b82f6 1px, transparent 1px);
  background-size:60px 60px;
  z-index:0;
}
.scanline{
  position:fixed;
  inset:0;
  pointer-events:none;
  background: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.02) 3px
  );
  z-index:1;
}
.wrapper{max-width:520px;margin:auto;padding:20px;position:relative;z-index:2;}
.glass{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;margin-bottom:16px;}
.identity{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.iconbox{height:40px;width:40px;border-radius:12px;background:rgba(255,0,0,0.1);display:flex;align-items:center;justify-content:center;}
.statusapi{margin-left:auto;font-size:10px;opacity:.7;display:flex;align-items:center;gap:6px;}
.dot{height:8px;width:8px;border-radius:999px;background:#666;}
label{font-size:10px;opacity:.6;display:block;margin-top:12px;}
input,select,textarea{width:100%;padding:8px;background:#000;border:1px solid #333;color:white;}
button{width:100%;margin-top:14px;height:40px;background:#e53935;color:white;border:none;cursor:pointer;}
.success{text-align:center;padding:24px;}
.successcircle{height:60px;width:60px;border-radius:999px;background:rgba(0,255,120,0.1);margin:auto;}
.info{margin-top:20px;font-size:11px;opacity:.6;}
</style>
</head>

<body>

<div class="grid"></div>
<div class="scanline"></div>

<div id="topbar-container"></div>

<div class="wrapper">

  <div class="identity">
    <div class="iconbox">📞</div>
    <div>
      <div style="font-weight:600;font-size:14px;">112 Noodlijn</div>
      <div style="font-size:11px;opacity:.6;">District 05</div>
    </div>
  </div>

  <div class="glass" id="formPanel">
    <h3>Noodoproep</h3>

    <label>Type *</label>
    <select id="type">
      <option value="">Selecteer...</option>
      <option>Brandweer</option>
      <option>Ambulance</option>
      <option>Politie</option>
    </select>

    <label>Locatie *</label>
    <input id="location">

    <label>Contact</label>
    <input id="phone">

    <label>Omschrijving</label>
    <textarea id="desc"></textarea>

    <button id="submitBtn">Noodoproep Versturen</button>
  </div>

  <div class="glass success" id="successPanel" style="display:none;">
    <div class="successcircle">✔</div>
    <h3>Verstuurd</h3>
    <div id="summary"></div>
    <button onclick="resetCall()" style="background:#333;margin-top:12px;">
      Nieuwe melding
    </button>
  </div>

</div>

<!-- ❌ BELANGRIJK: GEEN FIREBASE CODE HIER MEER -->

</body>
</html>
