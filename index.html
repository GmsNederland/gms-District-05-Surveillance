<!DOCTYPE html>
<html lang="nl" class="h-full bg-gray-900 text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>District 05 | Login</title>
  <link rel="icon" type="image/x-icon" href="/src/icone/logo.png">

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(-45deg, #0f172a, #1e293b, #3b82f6, #6366f1);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 1rem;
    }

    .inputfeils {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      color: black;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body class="h-screen flex items-center justify-center">

  <!-- LOGIN CARD -->
  <div class="glass px-12 py-10 max-w-md w-full border border-blue-900">

    <div class="text-center mb-8">
      <div class="w-20 h-20 bg-gradient-to-br from-blue-600 to-indigo-800 rounded-full mx-auto mb-4 flex items-center justify-center">
        <span class="text-2xl font-bold">D05</span>
      </div>

      <h1 class="text-2xl font-bold">District 05</h1>
      <p class="text-gray-400 text-sm">Meldkamer | GMS Systeem</p>
    </div>

    <form id="loginForm" class="space-y-4 text-center">

      <!-- EMAIL -->
      <div>
        <label class="block text-xs uppercase text-gray-400 mb-1">
          Email
        </label>
        <input id="email" class="inputfeils" type="email" placeholder="Email" required>
      </div>

      <!-- USERNAME (optioneel opslag in DB) -->
      <div>
        <label class="block text-xs uppercase text-gray-400 mb-1">
          Gebruikersnaam
        </label>
        <input id="username" class="inputfeils" type="text" placeholder="Gebruikersnaam" required>
      </div>

      <!-- PASSWORD -->
      <div>
        <label class="block text-xs uppercase text-gray-400 mb-1">
          Wachtwoord
        </label>
        <input id="password" class="inputfeils" type="password" placeholder="Wachtwoord" required>
      </div>

      <button id="loginBtn" type="submit"
        class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-semibold tracking-wide transition-all duration-200">
        Inloggen
      </button>

      <button id="wachtwoordvergetn">
      test
      </button>

      <p id="error" class="text-red-400 text-sm"></p>

    </form>

    <p class="text-center text-gray-500 text-xs mt-6">
      Officieel systeem voor Nederlandse RP-servers
    </p>

  </div>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import { 
      getDatabase, 
      ref, 
      set, 
      get 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRZCtv2Gr145LSlZw1QHIIkKXSHZoUk-U",
      authDomain: "district05surveillance-e5183.firebaseapp.com",
      databaseURL: "https://district05surveillance-e5183-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "district05surveillance-e5183",
      storageBucket: "district05surveillance-e5183.firebasestorage.app",
      messagingSenderId: "492638820842",
      appId: "1:492638820842:web:a3ff331099f9f4e88efa93"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const form = document.getElementById("loginForm");
    const error = document.getElementById("error");

    async function logToDiscord(message) {
      try {
        const webhookURL = "https://discord.com/api/webhooks/1486383318520955081/R-7TzBEw_izKBIiRnfCTH-FRdzqNvIYqJ-chIQ24Aae7_QJ3r8lIf5gM6NxnKcqmDIgQ";

        await fetch(webhookURL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            embeds: [{
              title: "🔐 Login Event",
              description: message,
              color: 3447003,
              timestamp: new Date()
            }]
          })
        });
      } catch (e) {
        console.warn("Discord logging gefaald");
      }
    }
    
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const username = document.getElementById("username").value;

      error.textContent = "";

      try {
        // 🔐 LOGIN MET FIREBASE AUTH
        const userCred = await signInWithEmailAndPassword(auth, email, password);

        const uid = userCred.user.uid;

        // 👤 OPSLAAN USER DATA IN RTDB
        await logToDiscord(`
          ✅ LOGIN SUCCES
          👤 Username: ${username}
          🆔 UID: ${uid}
          🕒 Tijd: ${new Date().toLocaleString()}
        `);
        
        await set(ref(db, "users/" + uid), {
          username: username,
          rol: "user",
          lastLogin: Date.now()
        });

        // 💾 SESSION
        sessionStorage.setItem("uid", uid);
        sessionStorage.setItem("username", username);

        // 🚀 REDIRECT
        window.location.href = "/src/pages/rolenselect.html";

      } catch (err) {
        console.error(err);
        error.textContent = "Login mislukt: " + err.message;
        await logToDiscord(`
      ❌ LOGIN MISLUKT
      ⚠️ Error: ${err.message}
      🕒 Tijd: ${new Date().toLocaleString()}
      `);
      }
    });
  </script>

</body>
</html>
